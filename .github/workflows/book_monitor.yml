import os
import requests

# Load ISBNdb API key from GitHub Actions environment
API_KEY = os.getenv("ISBNDB_API_KEY")

# Debug: confirm the key is being loaded
print("API KEY LOADED:", API_KEY is not None)

# Prepare headers for ISBNdb requests
headers = {"X-API-Key": API_KEY}
name: Book Monitor Daily Run
on:
  schedule:
    - cron: "0 10 * * *"   # Runs every day at 10:00 AM Eastern
  workflow_dispatch:        # Allows manual runs

jobs:
  run-book-monitor:
    runs-on: ubuntu-latest

    env:
      ISBNDB_API_KEY: ${{ secrets.ISBNDB_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "ISBNDB_API_KEY=${{ secrets.ISBNDB_API_KEY }}" > .env

      - name: Run book monitor script
        run: python book_monitor.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: book_master_db
          path: book_master.db
